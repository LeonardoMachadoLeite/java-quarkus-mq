quarkus:
  application:
    name: java-quarkus-mq

  datasource:
    db-kind: postgresql
    username: quarkus
    password: quarkus
    jdbc:
      url: jdbc:postgresql://localhost:5432/ratelimitdb

  hibernate-orm:
    database:
      generation: none
    log:
      sql: false

  flyway:
    migrate-at-start: true

  redis:
    hosts: redis://localhost:6379

  log:
    level: INFO
    category:
      "com.example":
        level: DEBUG

  http:
    port: 8080

# SmallRye RabbitMQ connector connection defaults (overridable via RABBITMQ_* env vars)
rabbitmq-host: localhost
rabbitmq-port: 5672
rabbitmq-username: guest
rabbitmq-password: guest

mp:
  messaging:
    outgoing:
      api-requests:
        connector: smallrye-rabbitmq
        exchange:
          name: api.requests
          type: topic
          durable: true
        routing-key: provider.default

    incoming:
      github-requests:
        connector: smallrye-rabbitmq
        exchange:
          name: api.requests
          type: topic
          durable: true
        queue:
          name: api.github.requests
          durable: true
          x-dead-letter-exchange: api.dlx
          x-message-ttl: 3600000
          x-max-length: 100000
        binding:
          routing-key: provider.github
        failure-strategy: reject

      stripe-requests:
        connector: smallrye-rabbitmq
        exchange:
          name: api.requests
          type: topic
          durable: true
        queue:
          name: api.stripe.requests
          durable: true
          x-dead-letter-exchange: api.dlx
          x-message-ttl: 3600000
          x-max-length: 100000
        binding:
          routing-key: provider.stripe
        failure-strategy: reject

rate-limit:
  providers:
    github:
      requests-per-window: 5000
      window-duration: PT1H
      burst-capacity: 100
      retry-delay: PT5S
      max-retries: 5
      max-retry-delay: PT5M
    stripe:
      requests-per-window: 100
      window-duration: PT1S
      burst-capacity: 10
      retry-delay: PT0.5S
      max-retries: 10
      max-retry-delay: PT30S

"%test":
  rabbitmq-host: localhost
  quarkus:
    datasource:
      db-kind: postgresql
      devservices:
        enabled: true
    redis:
      devservices:
        enabled: true
