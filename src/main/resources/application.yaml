quarkus:
  application:
    name: java-quarkus-mq

  datasource:
    db-kind: postgresql
    jdbc:
      # Send String params as 'unspecified' so PostgreSQL casts them into jsonb columns
      # (Job.request / Job.response hold pre-serialized JSON strings). Without this the
      # PG driver binds them as varchar and inserts fail: "column is of type jsonb but
      # expression is of type character varying". Applies to dev, prod and the DevServices
      # test datasource alike.
      additional-jdbc-properties:
        stringtype: unspecified

  hibernate-orm:
    database:
      generation: none
    log:
      sql: false

  flyway:
    migrate-at-start: true

  log:
    level: INFO
    category:
      "com.example":
        level: DEBUG

  http:
    port: 8080

# RabbitMQ connection (rabbitmq-host/port/username/password) lives in the %dev and
# %prod profiles, not here: leaving it out of the shared base lets the %test profile
# fall through to Quarkus RabbitMQ DevServices, which starts a throwaway broker.
mp:
  messaging:
    outgoing:
      api-requests:
        connector: smallrye-rabbitmq
        exchange:
          name: api.requests
          type: topic
          durable: true
        routing-key: provider.default

    incoming:
      github-requests:
        connector: smallrye-rabbitmq
        exchange:
          name: api.requests
          type: topic
          durable: true
        queue:
          name: api.github.requests
          durable: true
          x-dead-letter-exchange: api.dlx
          x-message-ttl: 3600000
          x-max-length: 100000
        binding:
          routing-key: provider.github
        failure-strategy: reject

      stripe-requests:
        connector: smallrye-rabbitmq
        exchange:
          name: api.requests
          type: topic
          durable: true
        queue:
          name: api.stripe.requests
          durable: true
          x-dead-letter-exchange: api.dlx
          x-message-ttl: 3600000
          x-max-length: 100000
        binding:
          routing-key: provider.stripe
        failure-strategy: reject

rate-limit:
  providers:
    github:
      requests-per-window: 5000
      window-duration: PT1H
      burst-capacity: 100
      retry-delay: PT5S
      max-retries: 5
      max-retry-delay: PT5M
    stripe:
      requests-per-window: 100
      window-duration: PT1S
      burst-capacity: 10
      retry-delay: PT0.5S
      max-retries: 10
      max-retry-delay: PT30S

# Dev mode and packaged (prod) runs connect to real infrastructure (see CLAUDE.md:
# "dev services not used — infra must be up"). Tests use DevServices instead, so the
# static JDBC URL must NOT live in the shared base config — otherwise it is inherited
# into the %test profile and overrides the throwaway container DevServices provides.
"%dev":
  rabbitmq-host: localhost
  rabbitmq-port: 5672
  rabbitmq-username: guest
  rabbitmq-password: guest
  quarkus:
    datasource:
      username: quarkus
      password: quarkus
      jdbc:
        url: jdbc:postgresql://localhost:5432/ratelimitdb
    redis:
      hosts: redis://localhost:6379

# Connection endpoints are overridable via RABBITMQ_*/QUARKUS_* env vars (see docker-compose.yml).
"%prod":
  rabbitmq-host: localhost
  rabbitmq-port: 5672
  rabbitmq-username: guest
  rabbitmq-password: guest
  quarkus:
    datasource:
      username: quarkus
      password: quarkus
      jdbc:
        url: jdbc:postgresql://localhost:5432/ratelimitdb
    redis:
      hosts: redis://localhost:6379

"%test":
  rate-limit:
    providers:
      test-provider:
        requests-per-window: 10
        window-duration: PT1S
        burst-capacity: 5
        retry-delay: PT0.1S
        max-retries: 3
        max-retry-delay: PT5S
  quarkus:
    datasource:
      db-kind: postgresql
      devservices:
        enabled: true
    redis:
      devservices:
        enabled: true
